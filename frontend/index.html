<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetQA — AI Data Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3B82F6;
            --primary-dim: rgba(59,130,246,0.12);
            --success: #10B981;
            --success-dim: rgba(16,185,129,0.12);
            --danger: #EF4444;
            --danger-dim: rgba(239,68,68,0.12);
            --warning: #F59E0B;
            --warning-dim: rgba(245,158,11,0.12);
            --purple: #8B5CF6;
            --purple-dim: rgba(139,92,246,0.12);
            --pink: #EC4899;
            --pink-dim: rgba(236,72,153,0.12);
            --bg: #0B1120;
            --bg-card: #131B2E;
            --bg-elevated: #1A2340;
            --bg-input: #0F172A;
            --border: #1E2D4A;
            --border-light: #2A3A5C;
            --text: #E8EDF5;
            --text-sec: #8899B4;
            --text-muted: #566A8A;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:#2A3A5C; border-radius:3px; }

        /* ── Layout ── */
        .app { display:flex; flex-direction:column; min-height:100vh; }
        
        /* ── Navbar ── */
        .navbar {
            height:60px; display:flex; align-items:center; justify-content:space-between;
            padding:0 28px; border-bottom:1px solid var(--border);
            background:rgba(11,17,32,0.9); backdrop-filter:blur(16px);
            position:sticky; top:0; z-index:50;
        }
        .nav-brand { display:flex; align-items:center; gap:12px; }
        .nav-logo {
            width:34px; height:34px; border-radius:10px;
            background:linear-gradient(135deg,var(--primary),var(--purple));
            display:flex; align-items:center; justify-content:center;
            font-weight:900; font-size:16px; color:white;
        }
        .nav-title { font-size:1.15rem; font-weight:800; color:var(--text); }
        .nav-tag {
            font-size:0.65rem; font-weight:700; padding:3px 8px; border-radius:5px;
            background:var(--primary-dim); color:#60A5FA; text-transform:uppercase; letter-spacing:0.5px;
        }
        .nav-right { display:flex; align-items:center; gap:12px; }
        .nav-status {
            display:flex; align-items:center; gap:6px; font-size:0.78rem;
            color:var(--text-muted);
        }
        .status-dot { width:7px; height:7px; border-radius:50%; background:var(--success); }
        .nav-btn {
            padding:7px 14px; border-radius:8px; border:1px solid var(--border);
            background:transparent; color:var(--text-sec); font-size:0.8rem;
            font-weight:500; cursor:pointer; transition:all 0.15s;
            display:flex; align-items:center; gap:6px;
        }
        .nav-btn:hover { background:var(--bg-elevated); color:var(--text); border-color:var(--border-light); }

        /* ── Main Content ── */
        .main { flex:1; display:flex; flex-direction:column; max-width:900px; width:100%; margin:0 auto; padding:32px 24px; }

        /* ── Input Area ── */
        .input-section { margin-bottom:28px; }
        .input-card {
            background:var(--bg-card); border:1px solid var(--border); border-radius:16px;
            padding:24px; position:relative;
        }
        .input-top { display:flex; align-items:flex-start; gap:16px; margin-bottom:16px; }
        .file-drop {
            width:140px; height:90px; border:2px dashed var(--border-light); border-radius:12px;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:6px; cursor:pointer; transition:all 0.2s; flex-shrink:0;
            background:var(--bg-input); position:relative; overflow:hidden;
        }
        .file-drop:hover { border-color:var(--primary); background:var(--primary-dim); }
        .file-drop.has-file { border-color:var(--success); border-style:solid; background:var(--success-dim); }
        .file-drop i { font-size:1.4rem; color:var(--text-muted); }
        .file-drop.has-file i { color:var(--success); }
        .file-drop span { font-size:0.7rem; color:var(--text-muted); text-align:center; line-height:1.2; }
        .file-drop.has-file span { color:var(--success); font-weight:600; }
        .file-drop input { position:absolute; inset:0; opacity:0; cursor:pointer; }

        .query-area { flex:1; display:flex; flex-direction:column; gap:10px; }
        .query-input {
            width:100%; background:var(--bg-input); border:1px solid var(--border);
            border-radius:10px; padding:14px 16px; color:var(--text); font-size:0.92rem;
            font-family:'Inter',sans-serif; resize:none; outline:none;
            transition:border-color 0.2s; min-height:70px;
        }
        .query-input::placeholder { color:var(--text-muted); }
        .query-input:focus { border-color:var(--primary); }

        .input-bottom { display:flex; align-items:center; justify-content:space-between; }
        .file-info { font-size:0.78rem; color:var(--text-muted); display:flex; align-items:center; gap:6px; }
        .file-info i { color:var(--success); }
        .analyze-btn {
            padding:10px 28px; border-radius:10px; border:none;
            background:linear-gradient(135deg,var(--primary),#2563EB);
            color:white; font-weight:700; font-size:0.9rem; cursor:pointer;
            display:flex; align-items:center; gap:8px; transition:all 0.2s;
            box-shadow:0 4px 15px rgba(59,130,246,0.3);
        }
        .analyze-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(59,130,246,0.4); }
        .analyze-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
        .analyze-btn .spinner { display:none; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; }
        .analyze-btn.loading .spinner { display:block; }
        .analyze-btn.loading .btn-text { display:none; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── Agent Activity ── */
        .agent-section { flex:1; }
        .agent-header {
            display:flex; align-items:center; gap:10px; margin-bottom:18px;
            padding-bottom:14px; border-bottom:1px solid var(--border);
        }
        .agent-header h2 { font-size:1rem; font-weight:700; }
        .agent-header .step-count { font-size:0.75rem; color:var(--text-muted); margin-left:auto; }

        .empty-state {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:80px 20px; color:var(--text-muted); text-align:center;
        }
        .empty-state i { font-size:3rem; margin-bottom:16px; opacity:0.3; }
        .empty-state h3 { font-size:1.05rem; font-weight:600; margin-bottom:6px; color:var(--text-sec); }
        .empty-state p { font-size:0.85rem; max-width:360px; }

        /* ── Step Cards ── */
        .steps { display:flex; flex-direction:column; gap:12px; }

        .step {
            background:var(--bg-card); border:1px solid var(--border); border-radius:14px;
            overflow:hidden; animation:stepIn 0.4s ease-out;
        }
        @keyframes stepIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

        .step-header {
            display:flex; align-items:center; gap:12px; padding:16px 20px;
            cursor:pointer; user-select:none; transition:background 0.15s;
        }
        .step-header:hover { background:rgba(255,255,255,0.02); }

        .step-icon {
            width:36px; height:36px; border-radius:10px;
            display:flex; align-items:center; justify-content:center;
            font-size:0.85rem; flex-shrink:0;
        }
        .step-info { flex:1; min-width:0; }
        .step-label { font-size:0.7rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px; }
        .step-title { font-weight:600; font-size:0.92rem; }
        .step-status {
            font-size:0.72rem; font-weight:600; padding:4px 10px; border-radius:6px;
        }
        .step-toggle { color:var(--text-muted); font-size:0.75rem; transition:transform 0.2s; }
        .step.open .step-toggle { transform:rotate(180deg); }

        .step-body { max-height:0; overflow:hidden; transition:max-height 0.35s ease; }
        .step.open .step-body { max-height:600px; }
        .step-content { padding:0 20px 18px; }

        .step-text { font-size:0.85rem; color:var(--text-sec); line-height:1.65; white-space:pre-wrap; }

        .code-block {
            background:#0A0F1A; border:1px solid #1A2235; border-radius:10px;
            padding:16px 18px; font-family:'JetBrains Mono',monospace;
            font-size:0.8rem; line-height:1.7; overflow-x:auto;
            color:#C9D8F0; position:relative; white-space:pre-wrap; word-break:break-word;
        }
        .code-label {
            position:absolute; top:8px; right:12px; font-size:0.6rem;
            font-weight:700; color:var(--text-muted); text-transform:uppercase;
            letter-spacing:0.5px; font-family:'Inter',sans-serif;
        }

        /* ── Verdict Badge ── */
        .verdict-badge {
            display:inline-flex; align-items:center; gap:6px;
            padding:6px 14px; border-radius:8px; font-size:0.82rem; font-weight:600;
        }
        .verdict-match { background:var(--success-dim); color:#34D399; }
        .verdict-mismatch { background:var(--warning-dim); color:#FBBF24; }

        /* ── Final Answer ── */
        .answer-card {
            background:var(--bg-card); border:1px solid var(--success);
            border-radius:14px; padding:24px; margin-top:16px;
            box-shadow:0 0 30px rgba(16,185,129,0.08);
            animation:stepIn 0.5s ease-out;
        }
        .answer-card.error { border-color:var(--danger); box-shadow:0 0 30px rgba(239,68,68,0.08); }
        .answer-card.rejected { border-color:var(--warning); box-shadow:0 0 30px rgba(245,158,11,0.08); }
        .answer-header {
            display:flex; align-items:center; gap:10px; margin-bottom:14px;
            padding-bottom:12px; border-bottom:1px solid var(--border);
        }
        .answer-header i { font-size:1.1rem; }
        .answer-header h3 { font-weight:700; font-size:1rem; }
        .answer-body { font-size:0.92rem; line-height:1.7; color:var(--text-sec); white-space:pre-wrap; word-break:break-word; }
        .answer-meta {
            display:flex; gap:16px; margin-top:14px; padding-top:12px;
            border-top:1px solid var(--border); font-size:0.78rem; color:var(--text-muted);
        }
        .answer-meta span { display:flex; align-items:center; gap:5px; }

        /* ── Processing indicator ── */
        @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
        .processing-dot { animation:pulse 1.2s ease-in-out infinite; }

        /* ── History Modal ── */
        .modal-overlay {
            position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.7);
            backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center;
        }
        .modal-overlay.show { display:flex; }
        .modal-box {
            background:var(--bg-card); border:1px solid var(--border); border-radius:18px;
            padding:28px; width:100%; max-width:600px; margin:20px; max-height:80vh; overflow-y:auto;
        }
        .modal-close {
            background:var(--bg-elevated); border:none; color:var(--text-muted);
            width:34px; height:34px; border-radius:8px; cursor:pointer;
            display:flex; align-items:center; justify-content:center; transition:all 0.15s;
        }
        .modal-close:hover { background:#2A3A5C; color:white; }
        .history-item {
            padding:14px; border-radius:10px; background:var(--bg-input);
            border:1px solid var(--border); margin-bottom:8px; transition:all 0.15s;
        }
        .history-item:hover { border-color:var(--border-light); }
        .history-status { font-size:0.7rem; font-weight:700; padding:3px 8px; border-radius:5px; }

        @media(max-width:640px) {
            .input-top { flex-direction:column; }
            .file-drop { width:100%; height:70px; flex-direction:row; }
            .main { padding:20px 16px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ── Navbar ── -->
        <div class="navbar">
            <div class="nav-brand">
                <div class="nav-logo">S</div>
                <span class="nav-title">SheetQA</span>
                <span class="nav-tag">AI Agent</span>
            </div>
            <div class="nav-right">
                <div class="nav-status"><div class="status-dot"></div> Agent Online</div>
                <button class="nav-btn" onclick="openHistory()"><i class="fas fa-clock-rotate-left"></i> History</button>
                <button class="nav-btn" onclick="window.open('docs.html','_blank')"><i class="fas fa-book"></i> Docs</button>
            </div>
        </div>

        <!-- ── Main ── -->
        <div class="main">
            <!-- Input -->
            <div class="input-section">
                <div class="input-card">
                    <div class="input-top">
                        <div class="file-drop" id="fileDrop">
                            <input type="file" accept=".csv,.xlsx,.xls" id="fileInput" onchange="handleFile(this)">
                            <i class="fas fa-file-csv"></i>
                            <span id="fileLabel">Drop CSV here<br>or click</span>
                        </div>
                        <div class="query-area">
                            <textarea class="query-input" id="queryInput" placeholder="Ask a question about your data...&#10;e.g. What is the total revenue by region?" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="input-bottom">
                        <div class="file-info" id="fileInfo"></div>
                        <button class="analyze-btn" id="analyzeBtn" onclick="runAgent()" disabled>
                            <span class="btn-text"><i class="fas fa-bolt"></i> Run Agent</span>
                            <div class="spinner"></div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Agent Activity -->
            <div class="agent-section">
                <div class="agent-header">
                    <i class="fas fa-robot" style="color:var(--primary);"></i>
                    <h2>Agent Activity</h2>
                    <div class="step-count" id="stepCount"></div>
                </div>

                <div id="agentOutput">
                    <div class="empty-state">
                        <i class="fas fa-microchip"></i>
                        <h3>Ready to analyze</h3>
                        <p>Upload a CSV file and ask a question. The agent will plan an approach, write Python code, execute it, and validate the answer.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── History Modal ── -->
    <div class="modal-overlay" id="historyModal" onclick="if(event.target===this)closeHistory()">
        <div class="modal-box">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h3 style="font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:8px;">
                    <i class="fas fa-clock-rotate-left" style="color:var(--primary);"></i> Run History
                </h3>
                <button class="modal-close" onclick="closeHistory()"><i class="fas fa-times"></i></button>
            </div>
            <div id="historyList"><p style="color:var(--text-muted);font-size:0.85rem;">Loading...</p></div>
        </div>
    </div>

    <script>
    const API = window.location.origin;
    let selectedFile = null;

    // ── File Handling ──
    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        selectedFile = file;
        const drop = document.getElementById('fileDrop');
        const label = document.getElementById('fileLabel');
        const info = document.getElementById('fileInfo');
        drop.classList.add('has-file');
        const name = file.name.length > 18 ? file.name.substring(0, 15) + '...' : file.name;
        label.innerHTML = `<i class="fas fa-check"></i> ${name}`;
        const sizeMB = (file.size / 1024 / 1024).toFixed(2);
        info.innerHTML = `<i class="fas fa-check-circle"></i> ${file.name} (${sizeMB} MB)`;
        updateBtn();
    }

    function updateBtn() {
        const btn = document.getElementById('analyzeBtn');
        const query = document.getElementById('queryInput').value.trim();
        btn.disabled = !selectedFile || !query;
    }
    document.getElementById('queryInput').addEventListener('input', updateBtn);

    // ── Step Rendering ──
    function createStep(icon, iconBg, iconColor, label, title, statusText, statusColor, content, isCode) {
        const step = document.createElement('div');
        step.className = 'step open';
        
        const bodyContent = isCode
            ? `<div class="code-block"><span class="code-label">Python</span>${escapeHtml(content)}</div>`
            : `<div class="step-text">${escapeHtml(content)}</div>`;

        step.innerHTML = `
            <div class="step-header" onclick="this.parentElement.classList.toggle('open')">
                <div class="step-icon" style="background:${iconBg};color:${iconColor};">
                    <i class="${icon}"></i>
                </div>
                <div class="step-info">
                    <div class="step-label">${label}</div>
                    <div class="step-title">${title}</div>
                </div>
                <span class="step-status" style="background:${statusColor}12;color:${statusColor};">${statusText}</span>
                <i class="fas fa-chevron-down step-toggle"></i>
            </div>
            <div class="step-body"><div class="step-content">${bodyContent}</div></div>
        `;
        return step;
    }

    function createProcessingStep(label, title) {
        const step = document.createElement('div');
        step.className = 'step';
        step.id = 'processing-step';
        step.innerHTML = `
            <div class="step-header">
                <div class="step-icon" style="background:var(--primary-dim);color:#60A5FA;">
                    <i class="fas fa-circle-notch fa-spin"></i>
                </div>
                <div class="step-info">
                    <div class="step-label">${label}</div>
                    <div class="step-title processing-dot">${title}</div>
                </div>
            </div>
        `;
        return step;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ── Main Agent Flow ──
    async function runAgent() {
        if (!selectedFile) return;
        const query = document.getElementById('queryInput').value.trim();
        if (!query) return;

        const btn = document.getElementById('analyzeBtn');
        const output = document.getElementById('agentOutput');
        const stepCount = document.getElementById('stepCount');

        btn.disabled = true;
        btn.classList.add('loading');
        output.innerHTML = '';
        stepCount.textContent = '';

        const steps = document.createElement('div');
        steps.className = 'steps';
        output.appendChild(steps);

        let count = 0;

        // Step 1: File Upload
        const uploadStep = createProcessingStep('Step 1', 'Uploading & validating file...');
        steps.appendChild(uploadStep);
        await sleep(300);

        // Make the API call
        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('query', query);

        let data;
        try {
            const resp = await fetch(`${API}/analyze`, { method: 'POST', body: formData });
            data = await resp.json();
        } catch (err) {
            uploadStep.remove();
            steps.appendChild(createStep(
                'fas fa-times-circle', 'var(--danger-dim)', '#F87171',
                'Error', 'Connection Failed',
                'ERROR', '#EF4444',
                `Could not reach the backend at ${API}.\nMake sure the server is running with: python main.py`, false
            ));
            btn.disabled = false;
            btn.classList.remove('loading');
            return;
        }

        // Remove processing indicator
        uploadStep.remove();

        // Step 1: File Validation
        count++;
        if (data.status === 'rejected') {
            steps.appendChild(createStep(
                'fas fa-shield-alt', 'var(--danger-dim)', '#F87171',
                'Step 1 — File Validation', 'File Rejected',
                'REJECTED', '#EF4444',
                (data.validation_errors || []).join('\n') || 'File validation failed.', false
            ));
            // Show rejection answer
            showAnswer(data, output);
        } else {
            steps.appendChild(createStep(
                'fas fa-shield-alt', 'var(--success-dim)', '#34D399',
                'Step 1 — File Validation', 'File Validated Successfully',
                'PASSED', '#10B981',
                `File accepted: ${selectedFile.name}\nFormat, size, and row count checks passed.`, false
            ));

            // Step 2: Planning
            await sleep(200);
            count++;
            if (data.plan) {
                steps.appendChild(createStep(
                    'fas fa-brain', 'var(--purple-dim)', '#A78BFA',
                    'Step 2 — Planning Agent', 'Analysis Plan Created',
                    'LLM', '#8B5CF6',
                    data.plan, false
                ));
            }

            // Step 3: Code Generation & Execution
            await sleep(200);
            count++;
            if (data.generated_code) {
                steps.appendChild(createStep(
                    'fas fa-code', 'var(--primary-dim)', '#60A5FA',
                    'Step 3 — Execution Agent', 'Python Code Written & Executed',
                    'SANDBOX', '#3B82F6',
                    data.generated_code, true
                ));
            }

            // Step 3b: Execution Output
            if (data.exec_output || data.exec_error) {
                await sleep(150);
                count++;
                const hasError = !!data.exec_error;
                steps.appendChild(createStep(
                    hasError ? 'fas fa-exclamation-triangle' : 'fas fa-terminal',
                    hasError ? 'var(--danger-dim)' : 'var(--success-dim)',
                    hasError ? '#F87171' : '#34D399',
                    'Step 4 — Execution Result', hasError ? 'Execution Error' : 'Code Output',
                    hasError ? 'ERROR' : 'OUTPUT', hasError ? '#EF4444' : '#10B981',
                    hasError ? data.exec_error : data.exec_output, false
                ));
            }

            // Step 4: Validation
            if (data.verdict) {
                await sleep(200);
                count++;
                const isMatch = data.verdict === 'match';
                steps.appendChild(createStep(
                    'fas fa-check-double', isMatch ? 'var(--success-dim)' : 'var(--warning-dim)',
                    isMatch ? '#34D399' : '#FBBF24',
                    'Step 5 — Validator Agent', isMatch ? 'Output Matches Query' : 'Output Mismatch',
                    isMatch ? 'MATCH' : 'MISMATCH', isMatch ? '#10B981' : '#F59E0B',
                    isMatch
                        ? 'The validator confirmed the code output directly and completely answers the user\'s question.'
                        : 'The validator detected the output does not fully answer the question. Agent will retry.', false
                ));
            }

            // Retry info
            if (data.retry_count > 0) {
                await sleep(150);
                steps.appendChild(createStep(
                    'fas fa-sync-alt', 'var(--warning-dim)', '#FBBF24',
                    'Self-Correction', `Agent retried ${data.retry_count} time(s)`,
                    'RETRY', '#F59E0B',
                    `The agent self-corrected ${data.retry_count} time(s) — re-planned and re-executed to improve the answer.`, false
                ));
            }

            // Final Answer
            await sleep(200);
            showAnswer(data, output);
        }

        stepCount.textContent = `${count} steps`;
        btn.disabled = false;
        btn.classList.remove('loading');
    }

    function showAnswer(data, container) {
        const card = document.createElement('div');
        let cls = 'answer-card';
        let icon, iconColor, title;

        if (data.status === 'success') {
            icon = 'fas fa-check-circle';
            iconColor = 'var(--success)';
            title = 'Final Answer';
        } else if (data.status === 'rejected') {
            cls += ' rejected';
            icon = 'fas fa-exclamation-triangle';
            iconColor = 'var(--warning)';
            title = 'File Rejected';
        } else {
            cls += ' error';
            icon = 'fas fa-times-circle';
            iconColor = 'var(--danger)';
            title = 'Analysis Failed';
        }

        card.className = cls;
        card.innerHTML = `
            <div class="answer-header">
                <i class="${icon}" style="color:${iconColor};"></i>
                <h3>${title}</h3>
            </div>
            <div class="answer-body">${escapeHtml(data.final_answer)}</div>
            <div class="answer-meta">
                <span><i class="fas fa-signal" style="color:var(--primary);"></i> Status: ${data.status}</span>
                <span><i class="fas fa-sync-alt" style="color:var(--warning);"></i> Retries: ${data.retry_count || 0}</span>
                <span><i class="fas fa-clock" style="color:var(--text-muted);"></i> ${new Date().toLocaleTimeString()}</span>
            </div>
        `;
        container.appendChild(card);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ── History Modal ──
    async function openHistory() {
        document.getElementById('historyModal').classList.add('show');
        const list = document.getElementById('historyList');
        list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">Loading...</p>';
        try {
            const resp = await fetch(`${API}/history`);
            const runs = await resp.json();
            if (!runs.length) {
                list.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;">No runs yet.</p>';
                return;
            }
            list.innerHTML = runs.map(r => {
                const statusColors = { success: '#10B981', rejected: '#EF4444', failed: '#F59E0B' };
                const c = statusColors[r.status] || '#64748B';
                return `
                    <div class="history-item">
                        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                            <span class="history-status" style="background:${c}18;color:${c};">${r.status}</span>
                            <span style="font-weight:600;font-size:0.88rem;">${escapeHtml(r.filename || 'N/A')}</span>
                            <span style="margin-left:auto;font-size:0.72rem;color:var(--text-muted);">${r.timestamp ? new Date(r.timestamp).toLocaleString() : ''}</span>
                        </div>
                        <p style="font-size:0.82rem;color:var(--text-sec);">${escapeHtml((r.query || '').substring(0, 120))}</p>
                        ${r.retry_count > 0 ? `<span style="font-size:0.72rem;color:var(--warning);margin-top:4px;display:inline-block;">Retries: ${r.retry_count}</span>` : ''}
                    </div>
                `;
            }).join('');
        } catch (e) {
            list.innerHTML = '<p style="color:#F87171;font-size:0.85rem;">Could not connect to backend.</p>';
        }
    }
    function closeHistory() { document.getElementById('historyModal').classList.remove('show'); }

    // ── Drag and drop ──
    const dropZone = document.getElementById('fileDrop');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; });
    dropZone.addEventListener('dragleave', () => { if (!selectedFile) dropZone.style.borderColor = ''; });
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file) {
            const input = document.getElementById('fileInput');
            const dt = new DataTransfer();
            dt.items.add(file);
            input.files = dt.files;
            handleFile(input);
        }
    });
    </script>
</body>
</html>
